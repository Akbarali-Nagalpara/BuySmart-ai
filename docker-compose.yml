version: '3.8'

services:
  # Backend Spring Boot Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: buysmart-backend
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_USER=${SUPABASE_USER}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - rapidkey=${rapidkey}
      - rapidhost=${rapidhost}
      - rapidurl=${rapidurl}
      - apifykey=${apifykey}
      - aiserviceurl=http://ai-service:5001/analyze
    networks:
      - buysmart-network
    restart: unless-stopped

  # Python AI Analysis Service
  ai-service:
    build:
      context: ./product-ai-analysis
      dockerfile: Dockerfile
    container_name: buysmart-ai-service
    ports:
      - "5001:5001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - buysmart-network
    restart: unless-stopped

  # Frontend React/Vite Service
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: buysmart-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - buysmart-network
    restart: unless-stopped

networks:
  buysmart-network:
    driver: bridge
